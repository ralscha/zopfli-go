name: Benchmark

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - README.md
  push:
    branches:
      - main
      - master
    paths-ignore:
      - README.md

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      UPSTREAM_ROOT: ${{ github.workspace }}/_upstream/zopfli
      UPSTREAM_EXE: ${{ github.workspace }}/_upstream/zopfli/build-go-bench/zopfli
      BENCHTIME: 2x

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install C build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Check out upstream zopfli
        uses: actions/checkout@v6
        with:
          repository: google/zopfli
          path: _upstream/zopfli

      - name: Build upstream C benchmark binary
        run: go run ./cmd/zopfli-task build-upstream -upstream-root "$UPSTREAM_ROOT" -out "$UPSTREAM_EXE"

      - name: Generate benchmark comparison table
        run: go run ./cmd/zopfli-task bench-summary -upstream-root "$UPSTREAM_ROOT" -upstream-exe "$UPSTREAM_EXE" -benchtime "$BENCHTIME" | tee benchmark-summary.md

      - name: Refresh README benchmark section
        run: go run ./cmd/zopfli-task bench-readme -readme README.md -summary-file benchmark-summary.md

      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo '## Benchmark comparison'
            echo
            if [ -f benchmark-summary.md ]; then
              cat benchmark-summary.md
            else
              echo 'Benchmark summary was not produced because an earlier step failed.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-summary
          path: benchmark-summary.md
          if-no-files-found: ignore

      - name: Commit README benchmark update
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- README.md; then
            echo 'README benchmark section unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "docs: update benchmark summary"
          git push
