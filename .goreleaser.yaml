version: 2

project_name: zopfli-go

builds:
  - id: zopfli-go
    main: ./cmd/zopfli-go
    binary: zopfli-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    ids:
      - zopfli-go
    formats:
      - tar.gz
    name_template: '{{ trimsuffix .Binary ".exe" }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

changelog:
  sort: asc