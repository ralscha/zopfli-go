version: '3'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  format:
    desc: Format all Go source files
    cmds:
      - go fix ./...
      - go fmt ./...

  lint:
    desc: Run golangci-lint in a Docker container
    cmds:
      - docker run --rm -v {{toSlash .ROOT_DIR}}:/app -w /app golangci/golangci-lint:v2.11.4 golangci-lint run -v --timeout 5m      

  build-upstream:
    desc: Build the upstream C zopfli binary
    cmds:
      - >-
        go run ./cmd/zopfli-task build-upstream
        {{if .UPSTREAM_ROOT}} -upstream-root {{quote .UPSTREAM_ROOT}}{{end}}
        {{if .OUT}} -out {{quote .OUT}}{{end}}
        {{if .CC}} -cc {{quote .CC}}{{end}}

  bench-upstream:
    desc: Run Go vs upstream C benchmarks
    cmds:
      - >-
        go run ./cmd/zopfli-task bench-upstream
        {{if .UPSTREAM_ROOT}} -upstream-root {{quote .UPSTREAM_ROOT}}{{end}}
        {{if .UPSTREAM_EXE}} -upstream-exe {{quote .UPSTREAM_EXE}}{{end}}
        {{if .BENCH}} -bench {{quote .BENCH}}{{end}}
        {{if .BENCHTIME}} -benchtime {{quote .BENCHTIME}}{{end}}
        {{if .CC}} -cc {{quote .CC}}{{end}}
        {{if .AUTO_BUILD}} -auto-build={{.AUTO_BUILD}}{{end}}

  capture-cpu-profile:
    desc: Capture a benchmark CPU profile and print pprof top
    cmds:
      - >-
        go run ./cmd/zopfli-task capture-cpu-profile
        {{if .PROFILE}} -profile {{quote .PROFILE}}{{end}}
        {{if .BENCH}} -bench {{quote .BENCH}}{{end}}
        {{if .BENCHTIME}} -benchtime {{quote .BENCHTIME}}{{end}}

  bench-pgo:
    desc: Compare baseline and PGO benchmark runs
    cmds:
      - >-
        go run ./cmd/zopfli-task bench-pgo
        {{if .PROFILE}} -profile {{quote .PROFILE}}{{end}}
        {{if .BENCH}} -bench {{quote .BENCH}}{{end}}
        {{if .BENCHTIME}} -benchtime {{quote .BENCHTIME}}{{end}}

  bench-summary:
    desc: Print a markdown benchmark summary table
    cmds:
      - >-
        go run ./cmd/zopfli-task bench-summary
        {{if .PROFILE}} -profile {{quote .PROFILE}}{{end}}
        {{if .BENCHTIME}} -benchtime {{quote .BENCHTIME}}{{end}}
        {{if .UPSTREAM_ROOT}} -upstream-root {{quote .UPSTREAM_ROOT}}{{end}}
        {{if .UPSTREAM_EXE}} -upstream-exe {{quote .UPSTREAM_EXE}}{{end}}
        {{if .CC}} -cc {{quote .CC}}{{end}}
        {{if .AUTO_BUILD}} -auto-build={{.AUTO_BUILD}}{{end}}

  test:
    desc: Run the test suite
    cmds:
      - go test ./...

  npm-publish:
    desc: Publish the npm package
    cmds:
      - npm run test:js
      - npm publish --access public

  tag:
    desc: Create a local git tag for a release
    summary: |
      Create a local git tag.

      Run with `task --interactive tag` to be prompted for TAG,
      or pass it explicitly with `task tag TAG=v1.0.0`.
    requires:
      vars: [TAG]
    preconditions:
      - sh: 'case "{{.TAG}}" in v*) exit 0 ;; *) exit 1 ;; esac'
        msg: TAG must start with v, for example v1.0.0
      - sh: 'if git rev-parse -q --verify "refs/tags/{{.TAG}}" >/dev/null 2>&1; then exit 1; fi; exit 0'
        msg: Tag already exists locally
    cmds:
      - git tag {{.TAG}}

  push-tag:
    desc: Push an existing git tag to GitHub
    summary: |
      Push a git tag to the origin remote.

      Run with `task --interactive push-tag` to be prompted for TAG,
      or pass it explicitly with `task push-tag TAG=v1.0.0`.
    requires:
      vars: [TAG]
    preconditions:
      - sh: 'case "{{.TAG}}" in v*) exit 0 ;; *) exit 1 ;; esac'
        msg: TAG must start with v, for example v1.0.0
      - sh: 'if git rev-parse -q --verify "refs/tags/{{.TAG}}" >/dev/null 2>&1; then exit 0; else exit 1; fi'
        msg: Tag does not exist locally. Run `task tag TAG=v1.0.0` first.
    cmds:
      - git push origin {{.TAG}}

  release-tag:
    desc: Create and push a release tag to GitHub
    summary: |
      Create a local git tag and push it to the origin remote.

      Run with `task --interactive release-tag` to be prompted for TAG,
      or pass it explicitly with `task release-tag TAG=v1.0.0`.
    requires:
      vars: [TAG]
    preconditions:
      - sh: 'case "{{.TAG}}" in v*) exit 0 ;; *) exit 1 ;; esac'
        msg: TAG must start with v, for example v1.0.0
      - sh: 'if git rev-parse -q --verify "refs/tags/{{.TAG}}" >/dev/null 2>&1; then exit 1; fi; exit 0'
        msg: Tag already exists locally
    cmds:
      - git tag {{.TAG}}
      - git push origin {{.TAG}}